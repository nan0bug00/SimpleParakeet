# Build Windows + Linux release packages on tag push or manual run.
# Creates a GitHub Release with both OS zip artifacts.

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update (e.g. v1.2.0). Leave empty to only build artifacts."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout (with LFS for GGUF)
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build API (PyInstaller onedir)
        shell: pwsh
        run: |
          pwsh -File scripts/build_exe.ps1 -Python "$env:pythonLocation\python.exe"

      - name: Fetch portable ffmpeg
        shell: pwsh
        run: pwsh -File scripts/fetch_ffmpeg.ps1

      - name: Fetch parakeet-server (Windows CPU)
        shell: pwsh
        run: |
          $rel = "${{ vars.PARAKEET_CPP_RELEASE }}"
          if ([string]::IsNullOrWhiteSpace($rel)) { $rel = "v0.4.0" }
          $api = "https://api.github.com/repos/mudler/parakeet.cpp/releases/tags/$rel"
          $json = Invoke-RestMethod -Uri $api -Headers @{ "User-Agent" = "SimpleParakeet-CI" }
          $assets = @($json.assets | ForEach-Object { $_.name })
          Write-Host "Assets on $rel`:"
          $assets | ForEach-Object { Write-Host "  $_" }
          $pick = $json.assets | Where-Object {
            $_.name -match 'win' -and $_.name -match 'cpu' -and $_.name -match '\.zip$'
          } | Select-Object -First 1
          if (-not $pick) {
            $pick = $json.assets | Where-Object {
              $_.name -match 'windows' -and $_.name -match '\.zip$'
            } | Select-Object -First 1
          }
          if (-not $pick) { throw "No Windows zip found on mudler/parakeet.cpp $rel — set repo variable PARAKEET_CPP_RELEASE" }
          Write-Host "Downloading $($pick.name)"
          $zip = "parakeet-win.zip"
          Invoke-WebRequest -Uri $pick.browser_download_url -OutFile $zip
          Expand-Archive -LiteralPath $zip -DestinationPath "_pk" -Force
          $exe = Get-ChildItem -Path "_pk" -Recurse -Filter "parakeet-server.exe" | Select-Object -First 1
          if (-not $exe) { throw "parakeet-server.exe not found inside $($pick.name)" }
          New-Item -ItemType Directory -Force -Path "bin" | Out-Null
          Copy-Item $exe.FullName "bin\parakeet-server.exe" -Force

      - name: Ensure model present
        shell: pwsh
        run: |
          $m = "models\tdt_ctc-110m-f16.gguf"
          if (-not (Test-Path -LiteralPath $m)) {
            Write-Host "GGUF missing from checkout — downloading from Hugging Face"
            New-Item -ItemType Directory -Force -Path "models" | Out-Null
            $url = "https://huggingface.co/mudler/parakeet-cpp-gguf/resolve/main/tdt_ctc-110m-f16.gguf"
            Invoke-WebRequest -Uri $url -OutFile $m
          }
          (Get-Item $m).Length

      - name: Stage release folder
        shell: pwsh
        run: |
          $stage = "stage\SimpleParakeet"
          if (Test-Path "stage") { Remove-Item "stage" -Recurse -Force }
          $dirs = @(
            "$stage",
            "$stage\bin",
            "$stage\bin\SimpleParakeet",
            "$stage\models",
            "$stage\licenses",
            "$stage\scripts",
            "$stage\src",
            "$stage\logs"
          )
          foreach ($d in $dirs) { New-Item -ItemType Directory -Force -Path $d | Out-Null }
          Copy-Item "RUN-ME.bat","launch.ps1","launch.cmd","README.md","CHANGELOG.md","config.example.json" $stage -Force
          Copy-Item "bin\parakeet-server.exe","bin\ffmpeg.exe" "$stage\bin\" -Force
          Copy-Item "bin\SimpleParakeet\*" "$stage\bin\SimpleParakeet\" -Recurse -Force
          Copy-Item "models\tdt_ctc-110m-f16.gguf" "$stage\models\" -Force
          Copy-Item "licenses\*" "$stage\licenses\" -Force
          # Windows scripts only (exclude .sh)
          Get-ChildItem "scripts" -File | Where-Object { $_.Extension -ne ".sh" } | ForEach-Object {
            Copy-Item $_.FullName "$stage\scripts\" -Force
          }
          Copy-Item "src\*" "$stage\src\" -Force
          Compress-Archive -Path "$stage\*" -DestinationPath "SimpleParakeet-windows-x64.zip" -Force
          Get-FileHash "SimpleParakeet-windows-x64.zip" -Algorithm SHA256 | Format-List

      # Default artifact zip-wrapping is fine: download-artifact unwraps it and
      # leaves the real release .zip in path/ (do NOT use archive:false here —
      # download would unpack the release zip itself and softprops would attach nothing).
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SimpleParakeet-windows-x64
          path: SimpleParakeet-windows-x64.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with LFS for GGUF)
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build API (PyInstaller onedir)
        run: |
          chmod +x scripts/build_api.sh
          ./scripts/build_api.sh "$pythonLocation/bin/python"

      - name: Fetch portable ffmpeg (BtbN linux64-lgpl)
        run: |
          chmod +x scripts/fetch_ffmpeg_linux.sh
          ./scripts/fetch_ffmpeg_linux.sh

      - name: Fetch parakeet-server (Linux CPU x64)
        env:
          PARAKEET_CPP_RELEASE: ${{ vars.PARAKEET_CPP_RELEASE }}
        run: |
          chmod +x scripts/fetch_parakeet_linux.sh
          if [ -z "${PARAKEET_CPP_RELEASE}" ]; then
            export PARAKEET_CPP_RELEASE=v0.4.0
          fi
          ./scripts/fetch_parakeet_linux.sh

      - name: Ensure model present
        run: |
          m="models/tdt_ctc-110m-f16.gguf"
          if [ ! -f "$m" ]; then
            echo "GGUF missing from checkout — downloading from Hugging Face"
            mkdir -p models
            curl -fsSL -o "$m" \
              "https://huggingface.co/mudler/parakeet-cpp-gguf/resolve/main/tdt_ctc-110m-f16.gguf"
          fi
          ls -la "$m"

      - name: Stage release folder
        run: |
          stage="stage/SimpleParakeet"
          rm -rf stage
          mkdir -p "$stage"/{bin/SimpleParakeet,models,licenses,scripts,src,logs}
          cp RUN-ME.sh launch.sh README.md CHANGELOG.md config.example.json "$stage/"
          cp bin/parakeet-server bin/ffmpeg "$stage/bin/"
          # Sibling .so from mudler bundle, if any
          shopt -s nullglob
          for lib in bin/*.so bin/*.so.*; do
            cp -f "$lib" "$stage/bin/"
          done
          shopt -u nullglob
          cp -a bin/SimpleParakeet/. "$stage/bin/SimpleParakeet/"
          cp models/tdt_ctc-110m-f16.gguf "$stage/models/"
          cp licenses/* "$stage/licenses/"
          # Linux scripts only
          cp scripts/*.sh "$stage/scripts/" 2>/dev/null || true
          cp src/* "$stage/src/"
          chmod +x "$stage/RUN-ME.sh" "$stage/launch.sh" \
            "$stage/bin/parakeet-server" "$stage/bin/ffmpeg" \
            "$stage/bin/SimpleParakeet/SimpleParakeet" \
            "$stage/scripts/"*.sh 2>/dev/null || true
          # Same format as Windows: one zip, contents at archive root
          (cd stage/SimpleParakeet && zip -r "$GITHUB_WORKSPACE/SimpleParakeet-linux-x64.zip" .)
          sha256sum SimpleParakeet-linux-x64.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: SimpleParakeet-linux-x64
          path: SimpleParakeet-linux-x64.zip
          if-no-files-found: error

  publish:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for CHANGELOG)
        uses: actions/checkout@v6

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: SimpleParakeet-windows-x64
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: SimpleParakeet-linux-x64
          path: dist

      - name: Verify release zips present
        run: |
          set -euo pipefail
          ls -lah dist/
          test -f dist/SimpleParakeet-windows-x64.zip
          test -f dist/SimpleParakeet-linux-x64.zip
          file dist/SimpleParakeet-windows-x64.zip | grep -qi 'zip'
          file dist/SimpleParakeet-linux-x64.zip | grep -qi 'zip'
          test "$(stat -c%s dist/SimpleParakeet-windows-x64.zip)" -gt 1000000
          test "$(stat -c%s dist/SimpleParakeet-linux-x64.zip)" -gt 1000000

      - name: Extract changelog for this release
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          # Body under "## [X.Y.Z] — …" until the next version heading
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          # Drop leading blank lines
          sed -i '/./,$!d' release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG.md section found for version ${VERSION} (tag ${TAG})" >&2
            exit 1
          fi
          echo "----- release notes -----"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: SimpleParakeet ${{ inputs.tag || github.ref_name }}
          body_path: release-notes.md
          fail_on_unmatched_files: true
          files: |
            dist/SimpleParakeet-windows-x64.zip
            dist/SimpleParakeet-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
